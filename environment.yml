# Conda env for parity checks, conversion, SeisBench validation, and figure scripts.
#
# TensorFlow/Keras versions are pinned to match the project's eqcctpro baseline (TF 2.15.1,
# Keras 2.15.0): newer stacks (TF 2.2x + Keras 3) can load the S HDF5 with different semantics
# and produce incorrect picks. TF is installed via pip for a reproducible pin.
#
# Create:    conda env create -f environment.yml
#            conda activate eqcct2pt
# Update:    conda env update -f environment.yml --prune
#
# If solving is slow, use mamba:   mamba env create -f environment.yml
#
# GPU PyTorch: remove pytorch-cpu and install a CUDA build matching your driver, e.g.
#   conda install pytorch pytorch-cuda=12.1 -c pytorch -c nvidia
#
name: eqcct2pt
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26,<2
  - scipy
  - matplotlib>=3.7
  - h5py
  - pandas
  - psutil
  - scikit-learn
  - tqdm
  - pytorch-cpu
  - pip:
    - tensorflow==2.15.1
    - keras==2.15.0
    - seisbench
    - silence-tensorflow
